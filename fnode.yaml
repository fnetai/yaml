name: fnet-yaml

ai::name: "@fnet/yaml"

s::repo.url: https://github.com/fnetai/yaml.git

features:
  app: false
  cli: false
  t::dev::cli: true

commands:
  build-dev:
    description: Build the development version of the YAML module
    usage: frun build-dev  
    steps:
      - fnode build --ftag dev

  deploy:
    description: Publish the package to the registry
    usage: frun deploy
    steps:
      - fnode deploy

  # === Test Categories ===

  test-setters:
    description: "Test s:: setter expressions (dot notation and array index)"
    usage: frun test-setters
    steps:
      - fnode cli:dev --config setter-basic
      - fnode cli:dev --config setter-array

  test-getters:
    description: "Test g:: / gtext:: / gbinary:: getter expressions across all protocols"
    usage: frun test-getters
    steps:
      - fnode cli:dev --config getter-local
      - fnode cli:dev --config getter-file
      - fnode cli:dev --config getter-relative
      - fnode cli:dev --config getter-array-local
      - fnode cli:dev --config getter-text
      - fnode cli:dev --config getter-binary
      - fnode cli:dev --config getter-npm
      - fnode cli:dev --config getter-recursive
      - fnode cli:dev --config gtext-file
      - fnode cli:dev --config gtext-npm
      - fnode cli:dev --config gbinary-http
      - fnode cli:dev --config gbinary-npm

  test-tags:
    description: "Test t:: tag expressions for environment-specific filtering"
    usage: frun test-tags
    steps:
      - fnode cli:dev --config tag-basic
      - fnode cli:dev --config tag-nested

  test-fragments:
    description: Test URL fragment (#/path) extraction from file and http sources
    usage: frun test-fragments
    steps:
      - fnode cli:dev --config fragment-basic
      - fnode cli:dev --config fragment-array
      - fnode cli:dev --config fragment-nested
      - fnode cli:dev --config fragment-http
      - fnode cli:dev --config fragment-mixed
      - fnode cli:dev --config fragment-bracket

  test-combined:
    description: Test combined usage of setters, getters, tags and fragments
    usage: frun test-combined
    steps:
      - fnode cli:dev --config combined-all

  test-merge:
    description: "Test merge:: processor with inline, stack, tag, fragment and root merges"
    usage: frun test-merge
    steps:
      - fnode cli:dev --config merge-basic
      - fnode cli:dev --config merge-stack
      - fnode cli:dev --config merge-tags
      - fnode cli:dev --config merge-fragments
      - fnode cli:dev --config merge-root

  test-push:
    description: "Test push:: processor with scalar, fragment and tag-based array stacking"
    usage: frun test-push
    steps:
      - fnode cli:dev --config push-basic
      - fnode cli:dev --config push-fragments
      - fnode cli:dev --config push-tags

  test-misc:
    description: Test property order preservation and error handling
    usage: frun test-misc
    steps:
      - fnode cli:dev --config test-order
      - fnode cli:dev --config error-handling

  # === Run All Automated Tests ===

  test-all:
    description: Run all test categories sequentially
    usage: frun test-all
    steps:
      - frun test-setters
      - frun test-getters
      - frun test-tags
      - frun test-fragments
      - frun test-combined
      - frun test-merge
      - frun test-push
      - frun test-misc