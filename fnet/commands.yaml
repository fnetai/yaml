tests:
  - frun setters
  - frun getters
  - frun tags
  - frun fragments
  - frun combined

setters:
  - fnode cli:dev --fargs setter-basic
  - fnode cli:dev --fargs setter-array

getters:
  - fnode cli:dev --fargs getter-local
  - fnode cli:dev --fargs getter-file
  - fnode cli:dev --fargs getter-text

tags:
  - fnode cli:dev --fargs tag-basic
  - fnode cli:dev --fargs tag-nested

fragments:
  - fnode cli:dev --fargs fragment-basic
  - fnode cli:dev --fargs fragment-array
  - fnode cli:dev --fargs fragment-nested
  - fnode cli:dev --fargs fragment-http
  - fnode cli:dev --fargs fragment-mixed

combined:
  - fnode cli:dev --fargs combined-all