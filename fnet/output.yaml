$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
properties:
  raw:
    type: string
    description: "Original unprocessed YAML content"
  content:
    type: string
    description: "Processed YAML content as string"
  parsed:
    type: object
    description: "Processed YAML content as JavaScript object"
required:
  - raw
  - content
  - parsed
additionalProperties: false