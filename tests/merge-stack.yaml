name: "Test: Merge Stack"
description: "Testing merge:: processor with deep stack merge"

merge::app:
  - name: base-app
    database:
      host: localhost
      port: 5432
      ssl: false
    features:
      auth: false
      billing: false
  - database:
      host: prod-db
      ssl: true
