name: "Test: Merge Tags"
description: "Testing merge:: processor combined with t:: tag filtering"

merge::app:
  - name: base-app
    env: base
  - debug: false

t::dev::merge::app:
  - env: development
    debug: true
    features:
      hotReload: true

t::prod::merge::app:
